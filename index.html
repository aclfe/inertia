<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Inertia: a real-time physics sandbox - rigid bodies, n-body gravity, cloth, fluid and thermal convection, projected in 3D onto braille. Runs entirely in the browser via WebAssembly."
    />
    <meta name="theme-color" content="#000000" />
    <title>Inertia - a physics sandbox in your browser</title>
    <!-- Braille-dot favicon, inline so the page stays self-contained. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cg fill='%23e6c84d'%3E%3Ccircle cx='11' cy='8' r='2.4'/%3E%3Ccircle cx='21' cy='8' r='2.4'/%3E%3Ccircle cx='11' cy='16' r='2.4'/%3E%3Ccircle cx='21' cy='16' r='2.4'/%3E%3Ccircle cx='11' cy='24' r='2.4'/%3E%3Ccircle cx='21' cy='24' r='2.4'/%3E%3C/g%3E%3C/svg%3E"
    />
    <!-- data-wasm-opt="0" disables trunk's wasm-opt pass (omitting it runs the
         pass by default). The cached wasm-opt predates the bulk-memory ops rustc
         now emits by default for wasm32, so it fails validation. The release
         profile (opt-level 3, lto, codegen-units 1) already optimizes the binary. -->
    <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="0" />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      /* The ratzilla canvas mounts here and sizes to this element. */
      #inertia-screen {
        width: 100vw;
        height: 100vh;
      }
      #inertia-screen canvas {
        width: 100%;
        height: 100%;
        display: block;
        /* The canvas is focusable (tabindex) so it can take key events; hide the
           focus ring since the whole viewport is the canvas. */
        outline: none;
      }

      /* Loading overlay shown until the wasm boots and the canvas mounts. */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        gap: 0;
        background: #000;
        color: #d7d7d7;
        font: 500 15px/1.6 ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas,
          "Liberation Mono", monospace;
        transition: opacity 0.5s ease;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      #boot .wordmark {
        font-size: clamp(30px, 8vw, 68px);
        font-weight: 700;
        letter-spacing: 0.38em;
        /* Offset the trailing letter-spacing so the text stays optically centered. */
        padding-left: 0.38em;
        color: #f2f2f2;
      }
      #boot .tagline {
        color: #6f6f6f;
        letter-spacing: 0.04em;
      }
      #boot .spinner {
        margin-top: 6px;
        font-size: 22px;
        color: #e6c84d;
        min-height: 1.4em;
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .spinner::after {
          content: "loading";
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="inertia-screen"></div>

    <div id="boot" role="status" aria-label="Loading Inertia">
      <div class="stack">
        <div class="wordmark">INERTIA</div>
        <div class="tagline">a physics sandbox, compiled to your browser</div>
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </div>

    <script>
      (function () {
        const screen = document.getElementById("inertia-screen");
        const boot = document.getElementById("boot");
        const spinnerEl = boot.querySelector(".spinner");

        // Thematic braille spinner while the wasm loads. Cleared once it boots.
        const FRAMES = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"];
        let frame = 0;
        const spin = setInterval(() => {
          spinnerEl.textContent = FRAMES[frame++ % FRAMES.length];
        }, 90);

        // ratzilla mounts a <canvas> into #inertia-screen and marks it focusable.
        // The key handlers live on that canvas, so it must hold focus or keyboard
        // input is dropped. Focus it as soon as it appears, and keep it focused.
        function focusCanvas() {
          const canvas = screen.querySelector("canvas");
          if (!canvas) return false;
          if (!canvas.hasAttribute("tabindex")) canvas.setAttribute("tabindex", "0");
          canvas.focus({ preventScroll: true });
          return true;
        }

        function ready() {
          focusCanvas();
          clearInterval(spin);
          boot.classList.add("hidden");
          setTimeout(() => boot.remove(), 600);
        }

        if (screen.querySelector("canvas")) {
          ready();
        } else {
          const observer = new MutationObserver(() => {
            if (screen.querySelector("canvas")) {
              observer.disconnect();
              ready();
            }
          });
          observer.observe(screen, { childList: true, subtree: true });
        }

        // A click anywhere re-grabs focus so keyboard control never silently dies
        // (e.g. after alt-tabbing away and back).
        window.addEventListener("pointerdown", focusCanvas);

        // Keep arrows and space driving the sim instead of scrolling the page.
        window.addEventListener(
          "keydown",
          (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
              e.preventDefault();
            }
          },
          { passive: false }
        );

        // Suppress the browser context menu so right-click selects in the sandbox.
        screen.addEventListener("contextmenu", (e) => e.preventDefault());
      })();
    </script>
  </body>
</html>
